<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI景点推荐</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/framer-motion@10/dist/framer-motion.js"></script>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0c29}
.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
.glass{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2)}
.glow{box-shadow:0 0 20px rgba(139,92,246,0.5),0 0 40px rgba(59,130,246,0.3)}
.particle{position:absolute;border-radius:50%;background:rgba(139,92,246,0.3);animation:float 6s infinite ease-in-out}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.1)}}
.btn-glow:hover{box-shadow:0 0 30px rgba(139,92,246,0.6)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const { motion } = window.Motion;

const spots = [
  {name:"灵隐寺",lat:30.242,lng:120.135,district:"西湖区",city:"杭州市",province:"浙江省",tags:["人文","祈福"],imgUrl:"https://images.unsplash.com/photo-1548013146724-224c2b381da9?w=800",desc:"千年古刹，禅意深远"},
  {name:"西湖",lat:30.25,lng:120.16,district:"西湖区",city:"杭州市",province:"浙江省",tags:["自然","湖泊"],imgUrl:"https://images.unsplash.com/photo-1569949381669-ecf31ae8e613?w=800",desc:"人间天堂，湖光山色"},
  {name:"雷峰塔",lat:30.23,lng:120.14,district:"西湖区",city:"杭州市",province:"浙江省",tags:["历史","地标"],imgUrl:"https://images.unsplash.com/photo-1599571234909-29ed5d1321d6?w=800",desc:"白蛇传说的见证"},
  {name:"宋城",lat:30.17,lng:120.09,district:"西湖区",city:"杭州市",province:"浙江省",tags:["文化","演艺"],imgUrl:"https://images.unsplash.com/photo-1528164344705-47542687000d?w=800",desc:"给我一天，还你千年"},
  {name:"千岛湖",lat:29.59,lng:119.01,district:"淳安县",city:"杭州市",province:"浙江省",tags:["自然","岛屿"],imgUrl:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800",desc:"天下第一秀水"}
];

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

export default function App(){
  const [location,setLocation]=useState(null);
  const [region,setRegion]=useState("district");
  const [distance,setDistance]=useState(null);
  const [result,setResult]=useState(null);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(pos=>{
        setLocation({lat:pos.coords.latitude,lng:pos.coords.longitude});
      },()=>setLocation(null));
    }
  },[]);

  const filterSpots=()=>{
    let filtered=spots;
    if(region==="district") filtered=filtered.filter(s=>s.district==="西湖区");
    else if(region==="city") filtered=filtered.filter(s=>s.city==="杭州市");
    else if(region==="province") filtered=filtered.filter(s=>s.province==="浙江省");
    
    if(distance && location){
      filtered=filtered.filter(s=>haversine(location.lat,location.lng,s.lat,s.lng)<=parseFloat(distance));
    }
    return filtered.length>0?filtered:spots;
  };

  const recommend=()=>{
    setLoading(true);
    setTimeout(()=>{
      const pool=filterSpots();
      setResult(pool[Math.floor(Math.random()*pool.length)]);
      setLoading(false);
    },500);
  };

  return(
    <div className="min-h-screen relative overflow-hidden">
      {[...Array(20)].map((_,i)=>(
        <div key={i} className="particle" style={{
          width:Math.random()*10+5+'px',height:Math.random()*10+5+'px',
          left:Math.random()*100+'%',top:Math.random()*100+'%',
          animationDelay:Math.random()*6+'s'
        }}/>
      ))}
      
      <div className="relative z-10 max-w-2xl mx-auto p-6">
        <motion.h1 
          initial={{opacity:0,y:-20}} animate={{opacity:1,y:0}}
          className="text-4xl font-bold text-center mb-8 bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent"
        >
          AI景点推荐
        </motion.h1>

        {location?(
          <motion.div initial={{opacity:0}} animate={{opacity:1}} className="glass rounded-xl p-4 mb-6 text-center text-white">
            📍 定位成功：{location.lat.toFixed(2)}, {location.lng.toFixed(2)}
          </motion.div>
        ):(
          <div className="glass rounded-xl p-4 mb-6 text-center text-white">⚠️ 定位失败，已切换全国范围</div>
        )}

        <div className="space-y-4 mb-6">
          <div className="flex gap-2 flex-wrap justify-center">
            {['1km','5km','10km','20km'].map(d=>(
              <motion.button key={d} whileHover={{scale:1.05}} whileTap={{scale:0.95}}
                onClick={()=>{setDistance(d);setRegion(null)}}
                className={`px-4 py-2 rounded-full glass ${distance===d?'glow':''} text-white btn-glow transition`}
              >{d}</motion.button>
            ))}
          </div>
          <div className="flex gap-2 flex-wrap justify-center">
            {[['district','当前区'],['city','当前市'],['province','当前省'],['nationwide','全国']].map(([k,v])=>(
              <motion.button key={k} whileHover={{scale:1.05}} whileTap={{scale:0.95}}
                onClick={()=>{setRegion(k);setDistance(null)}}
                className={`px-4 py-2 rounded-full glass ${region===k?'glow':''} text-white btn-glow transition`}
              >{v}</motion.button>
            ))}
          </div>
        </div>

        <motion.button whileHover={{scale:1.05}} whileTap={{scale:0.95}}
          onClick={recommend} disabled={loading}
          className="w-full py-4 rounded-xl gradient-bg text-white font-bold text-lg glow btn-glow disabled:opacity-50"
        >
          {loading?'推荐中...':'开始筛选'}
        </motion.button>

        {result && (
          <motion.div initial={{opacity:0,y:50}} animate={{opacity:1,y:0}}
            className="mt-8 glass rounded-2xl overflow-hidden glow"
          >
            <img src={result.imgUrl} alt={result.name} className="w-full h-48 object-cover"/>
            <div className="p-6 text-white">
              <h2 className="text-2xl font-bold mb-2">{result.name}</h2>
              <p className="text-gray-300 mb-4">{result.desc}</p>
              <div className="flex gap-2 mb-4">
                {result.tags.map(t=>(
                  <span key={t} className="px-3 py-1 rounded-full bg-purple-500/30 text-sm">{t}</span>
                ))}
              </div>
              <motion.button whileHover={{scale:1.05}} whileTap={{scale:0.95}}
                onClick={recommend}
                className="w-full py-3 rounded-lg gradient-bg font-semibold btn-glow"
              >换一个</motion.button>
            </div>
          </motion.div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
