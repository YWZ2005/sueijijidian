<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI景点推荐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: #fef3c7;
  min-height: 100vh;
  padding: 20px;
}

.container { max-width: 600px; margin: 0 auto; }

h1 {
  font-family: 'Caveat', cursive;
  color: #f87171;
  font-size: 2.5rem;
  text-align: center;
  margin-bottom: 20px;
  animation: wobble 2s ease-in-out infinite;
}

.location-info {
  background: white;
  border: 3px solid #f87171;
  border-radius: 20px 15px 25px 18px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 3px 3px 0 rgba(248,113,113,0.3);
}

.location-text { color: #92400e; font-weight: 500; }

.range-group, .region-group {
  margin-bottom: 15px;
}

label {
  display: block;
  color: #92400e;
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 0.95rem;
}

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.filter-btn {
  background: white;
  border: 2px solid #f87171;
  border-radius: 15px 12px 18px 14px;
  padding: 8px 14px;
  color: #f87171;
  cursor: pointer;
  font-weight: 500;
  transition: all 0.2s;
}

.filter-btn:hover { transform: scale(1.05); }
.filter-btn.active {
  background: #f87171;
  color: white;
  box-shadow: 2px 2px 0 rgba(248,113,113,0.4);
}

.start-btn {
  width: 100%;
  background: #f87171;
  color: white;
  border: none;
  border-radius: 18px 15px 22px 17px;
  padding: 14px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 15px;
  box-shadow: 3px 3px 0 rgba(248,113,113,0.4);
  transition: all 0.2s;
}

.start-btn:hover { transform: translateY(-2px); box-shadow: 4px 4px 0 rgba(248,113,113,0.5); }

.result-card {
  background: white;
  border: 3px solid #f87171;
  border-radius: 25px 20px 28px 22px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 4px 4px 0 rgba(248,113,113,0.3);
  position: relative;
  animation: bounceIn 0.5s ease-out;
}

.result-card::before {
  content: '★';
  position: absolute;
  top: -10px;
  right: 20px;
  color: #fbbf24;
  font-size: 1.5rem;
  animation: twinkle 1.5s ease-in-out infinite;
}

.spot-name {
  font-family: 'Caveat', cursive;
  color: #f87171;
  font-size: 1.8rem;
  margin-bottom: 10px;
}

.spot-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 15px;
  margin-bottom: 12px;
  border: 2px dashed #f87171;
}

.spot-desc { color: #78350f; line-height: 1.6; margin-bottom: 10px; }

.spot-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }

.tag {
  background: #fef3c7;
  color: #92400e;
  padding: 4px 10px;
  border-radius: 10px;
  font-size: 0.85rem;
  border: 1px solid #f87171;
}

.retry-btn {
  width: 100%;
  background: #fbbf24;
  color: #92400e;
  border: 2px solid #f87171;
  border-radius: 15px;
  padding: 10px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 10px;
}

@keyframes wobble {
  0%, 100% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
}

@keyframes bounceIn {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes twinkle {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>✨ 发现身边的美好 ✨</h1>
  
  <div class="location-info">
    <p class="location-text" id="locationText">📍 正在获取位置...</p>
  </div>

  <div class="range-group">
    <label>按距离筛选</label>
    <div class="btn-row" id="distanceBtns">
      <button class="filter-btn" data-range="1km">1公里内</button>
      <button class="filter-btn" data-range="5km">5公里内</button>
      <button class="filter-btn" data-range="10km">10公里内</button>
      <button class="filter-btn" data-range="20km">20公里内</button>
    </div>
  </div>

  <div class="region-group">
    <label>按行政区域筛选</label>
    <div class="btn-row" id="regionBtns">
      <button class="filter-btn" data-region="district">当前区/县</button>
      <button class="filter-btn" data-region="city">当前城市</button>
      <button class="filter-btn" data-region="province">当前省份</button>
      <button class="filter-btn" data-region="nationwide">全国</button>
    </div>
  </div>

  <button class="start-btn" id="startBtn">开始筛选 🎯</button>

  <div id="resultArea" class="hidden"></div>
</div>

<script>
const spots = [
  {name:"灵隐寺",lat:30.242,lng:120.135,district:"西湖区",city:"杭州市",province:"浙江省",tags:["人文","祈福"],imgUrl:"https://picsum.photos/seed/lingyin/400/200",desc:"千年古刹，禅意深远"},
  {name:"西湖",lat:30.25,lng:120.15,district:"西湖区",city:"杭州市",province:"浙江省",tags:["自然","湖景"],imgUrl:"https://picsum.photos/seed/westlake/400/200",desc:"人间天堂，美景如画"},
  {name:"宋城",lat:30.18,lng:120.08,district:"西湖区",city:"杭州市",province:"浙江省",tags:["主题乐园","文化"],imgUrl:"https://picsum.photos/seed/songcheng/400/200",desc:"给我一天，还你千年"},
  {name:"千岛湖",lat:29.59,lng:119.02,district:"淳安县",city:"杭州市",province:"浙江省",tags:["湖泊","度假"],imgUrl:"https://picsum.photos/seed/qiandao/400/200",desc:"天下第一秀水"},
  {name:"乌镇",lat:30.75,lng:120.48,district:"桐乡市",city:"嘉兴市",province:"浙江省",tags:["古镇","水乡"],imgUrl:"https://picsum.photos/seed/wuzhen/400/200",desc:"中国最后的枕水人家"},
  {name:"故宫",lat:39.916,lng:116.397,district:"东城区",city:"北京市",province:"北京市",tags:["历史","皇家"],imgUrl:"https://picsum.photos/seed/gugong/400/200",desc:"明清两代皇家宫殿"},
  {name:"长城",lat:40.43,lng:116.57,district:"延庆区",city:"北京市",province:"北京市",tags:["历史","徒步"],imgUrl:"https://picsum.photos/seed/greatwall/400/200",desc:"不到长城非好汉"},
  {name:"外滩",lat:31.24,lng:121.49,district:"黄浦区",city:"上海市",province:"上海市",tags:["夜景","建筑"],imgUrl:"https://picsum.photos/seed/waitan/400/200",desc:"万国建筑博览群"},
  {name:"鼓浪屿",lat:24.44,lng:118.07,district:"思明区",city:"厦门市",province:"福建省",tags:["海岛","文艺"],imgUrl:"https://picsum.photos/seed/gulangyu/400/200",desc:"海上花园"},
  {name:"张家界",lat:29.12,lng:110.48,district:"永定区",city:"张家界市",province:"湖南省",tags:["山水","自然"],imgUrl:"https://picsum.photos/seed/zhangjiajie/400/200",desc:"奇峰异石，仙境之地"}
];

let userLat = null, userLng = null, userRegion = {district:"",city:"",province:""};
let selectedRange = null, selectedRegion = null;

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

if(navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    document.getElementById('locationText').textContent = `📍 定位成功 (${userLat.toFixed(2)}, ${userLng.toFixed(2)})`;
    document.querySelector('[data-region="district"]').classList.add('active');
    selectedRegion = 'district';
  }, () => {
    document.getElementById('locationText').textContent = '📍 定位失败，已切换至全国范围';
    document.querySelector('[data-region="nationwide"]').classList.add('active');
    selectedRegion = 'nationwide';
  });
}

document.querySelectorAll('#distanceBtns .filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#distanceBtns .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRange = btn.dataset.range;
    selectedRegion = null;
    document.querySelectorAll('#regionBtns .filter-btn').forEach(b => b.classList.remove('active'));
  };
});

document.querySelectorAll('#regionBtns .filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#regionBtns .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedRegion = btn.dataset.region;
    selectedRange = null;
    document.querySelectorAll('#distanceBtns .filter-btn').forEach(b => b.classList.remove('active'));
  };
});

function filterSpots() {
  let filtered = [...spots];
  if(selectedRange && userLat) {
    const km = parseInt(selectedRange);
    filtered = filtered.filter(s => haversine(userLat, userLng, s.lat, s.lng) <= km);
  }
  if(selectedRegion === 'district' && userRegion.district) filtered = filtered.filter(s => s.district === userRegion.district);
  else if(selectedRegion === 'city' && userRegion.city) filtered = filtered.filter(s => s.city === userRegion.city);
  else if(selectedRegion === 'province' && userRegion.province) filtered = filtered.filter(s => s.province === userRegion.province);
  return filtered.length > 0 ? filtered : spots;
}

function showResult() {
  const filtered = filterSpots();
  const spot = filtered[Math.floor(Math.random() * filtered.length)];
  const area = document.getElementById('resultArea');
  area.innerHTML = `
    <div class="result-card">
      <h2 class="spot-name">${spot.name}</h2>
      <img src="${spot.imgUrl}" class="spot-img" alt="${spot.name}">
      <p class="spot-desc">${spot.desc}</p>
      <div class="spot-tags">${spot.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <button class="retry-btn" onclick="showResult()">换一个 💫</button>
    </div>
  `;
  area.classList.remove('hidden');
}

document.getElementById('startBtn').onclick = showResult;
</script>
</body>
</html>
